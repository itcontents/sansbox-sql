# sqldb-sandbox nginx front-end.
# Template — placeholders are replaced by scripts/bootstrap.sh.
#
#   __API_DOMAIN__       public hostname (SANDBOX_PUBLIC_HOST in .env)
#   __SSL_CERT__         TLS cert path (SANDBOX_NGINX_SSL_CERT in .env)
#   __SSL_KEY__          TLS key path  (SANDBOX_NGINX_SSL_KEY in .env)
#   __UPSTREAM__         uvicorn upstream, default 127.0.0.1:8080
#   __ALLOWED_CIDRS__    space-separated list of allowed client CIDRs, or "all"
#
# Cloudflare is DNS+SSL only; nginx terminates TLS on the host and forwards
# to uvicorn on localhost. CF "DNS only" record points at this host's public IP.

upstream sqldb_sandbox_app {
    server __UPSTREAM__;
}

# Restrict who can hit /healthz. Health checks should never come from the
# public internet. Override / leave blank to allow any source.
map $http_cf_connecting_ip $sqldb_remote_addr {
    default $remote_addr;
    "~^(?<cfip>[0-9.]+)$" $cfip;
    "~^(?<cfip>[0-9a-fA-F:]+)$" $cfip;
}

# --- HTTP: 301 everything to HTTPS ---
server {
    listen 80;
    listen [::]:80;
    server_name __API_DOMAIN__;

    # Health check from a known source can hit plain HTTP. Leave commented
    # unless you run your own monitoring on this port.
    # location = /healthz { access_log off; return 200 'ok'; add_header Content-Type text/plain; }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name __API_DOMAIN__;

    ssl_certificate     __SSL_CERT__;
    ssl_certificate_key __SSL_KEY__;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS — CF is already terminating TLS, so clients see HTTPS end-to-end.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;

    client_max_body_size 1m;

    # Per-access logging into the API's own log dir; sessions then go through.
    access_log /var/log/nginx/sqldb-sandbox.access.log;
    error_log  /var/log/nginx/sqldb-sandbox.error.log;

    # ----- Per-route method locks (defence in depth) -----

    # GET /healthz, /readyz, /metrics
    location ~ ^/(healthz|readyz|metrics)$ {
        limit_except GET { deny all; }
        proxy_pass http://sqldb_sandbox_app;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
        proxy_connect_timeout 2s;
        proxy_read_timeout    5s;
    }

    # POST /instance
    location = /instance {
        limit_except POST { deny all; }
        proxy_pass http://sqldb_sandbox_app;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # mysqldump against prod via SSH tunnel can be slow for big DBs.
        proxy_connect_timeout 10s;
        proxy_send_timeout    1800s;
        proxy_read_timeout    1800s;
    }

    # GET /session-tls/{sid}/ca.pem
    location ~ ^/session-tls/[^/]+/ca\.pem$ {
        limit_except GET { deny all; }
        proxy_pass http://sqldb_sandbox_app;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
    }

    # POST /session/{sid}/reset-ttl
    location ~ ^/session/[^/]+/reset-ttl$ {
        limit_except POST { deny all; }
        proxy_pass http://sqldb_sandbox_app;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout    60s;
    }

    # GET or DELETE /session/{sid}
    location ~ ^/session/[^/]+$ {
        limit_except GET DELETE { deny all; }
        proxy_pass http://sqldb_sandbox_app;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout    60s;
    }

    # POST /webhook/ticket-closed
    location = /webhook/ticket-closed {
        limit_except POST { deny all; }
        proxy_pass http://sqldb_sandbox_app;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
    }

    # Anything else -> FastAPI will 404 it; nginx 444s to avoid info leak.
    location / {
        return 444;
    }
}
